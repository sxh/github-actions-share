name: Shared DeepSeek Review

on:
  workflow_call:
    secrets:
      TOKEN:
        required: true

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR code (merge commit)
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge

      - name: Checkout shared tools
        uses: actions/checkout@v4
        with:
          repository: sxh/github-actions-share
          path: .github/actions-share
          ref: main

      - name: Run DeepSeek Full-Context Review
        run: python3 .github/actions-share/scripts/deepseek-review.py
        env:
          CHAT_TOKEN: ${{ secrets.TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
